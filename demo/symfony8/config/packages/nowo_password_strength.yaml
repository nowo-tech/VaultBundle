# Password Strength Bundle — used by Vault login item password fields
nowo_password_strength:
    # Must match twig.form_themes (bootstrap_5_layout in this demo)
    form_theme: bootstrap_5_layout.html.twig

    # Show strength meter and requirements below the input
    feedback_position: below

    # Default policy level when a field does not override it (weak | medium | strong)
    default_level: medium

    # Inline generator button fills the password input (alternatives: off, modal)
    generator_mode: input

    # Stack PasswordToggleBundle on top of PasswordStrengthType when both are installed
    use_password_toggle: true
