# Password Toggle Bundle — show/hide control for password fields
nowo_password_toggle:
    # Enable the visibility toggle by default on PasswordType fields
    toggle: true

    # Iconify icons (requires symfony/ux-icons); shown when the password is masked
    visible_icon: 'tabler:eye-off'

    # Iconify icon shown when the password is visible
    hidden_icon: 'tabler:eye'
