security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto
            cost: 4

    providers:
        app_user_provider:
            entity:
                class: Nowo\VaultBundle\Tests\App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt)
            security: false
        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/api/vault/extension, roles: PUBLIC_ACCESS }
