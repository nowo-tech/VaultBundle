framework:
    secret: test-secret
    test: true
    csrf_protection: true
    cache:
        app: cache.adapter.array
    router:
        resource: '%kernel.project_dir%/config/routes.yaml'
        type: yaml
    session:
        storage_factory_id: session.storage.factory.mock_file
    http_method_override: false
    handle_all_throwables: true
    php_errors:
        log: true
