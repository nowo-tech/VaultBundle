doctrine:
    dbal:
        url: 'sqlite:///%kernel.cache_dir%/e2e.db'
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        mappings:
            TestUser:
                type: attribute
                dir: '%kernel.project_dir%/Entity'
                prefix: 'Nowo\VaultBundle\Tests\App\Entity'
                is_bundle: false
